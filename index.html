<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" class="fa-solid fa-cloud-bolt fa-2x brand-icon"/>
    <title>Weather Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js for Graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="light-mode bg-default">
    <!-- Dynamic Animated Background Container -->
    <div id="animated-bg" class="animated-bg"></div>

    <div class="app-container">

        <!-- Sidebar / Navigation -->
        <aside class="sidebar glass-panel">
            <div class="brand">
                <i class="fa-solid fa-cloud-bolt fa-2x brand-icon"></i>
                <h2>Weather<span class="highlight">Dash</span></h2>
            </div>

            <div class="search-section">
                <form id="search-form" class="search-box">
                    <i class="fa-solid fa-search search-icon"></i>
                    <input type="text" id="city-input" placeholder="Search city..." autocomplete="off">
                    <button type="button" id="location-btn" class="icon-btn" title="Use my location">
                        <i class="fa-solid fa-location-crosshairs"></i>
                    </button>
                    <button type="submit" class="hidden-submit"></button>
                </form>
                <div id="search-error" class="error-msg hidden">City not found. Please try again.</div>
            </div>

            <nav class="sidebar-nav">
                <h3>Recents</h3>
                <ul id="history-list" class="history-list">
                    <!-- Dynamic history items -->
                </ul>
            </nav>

            <div class="settings-section">
                <div class="toggle-group">
                    <span>°C</span>
                    <label class="switch">
                        <input type="checkbox" id="unit-toggle">
                        <span class="slider round"></span>
                    </label>
                    <span>°F</span>
                </div>

                <div class="theme-toggle">
                    <button id="theme-btn" class="icon-btn">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <span>Theme</span>
                </div>
            </div>
        </aside>

        <!-- Main Dashboard -->
        <main class="dashboard-main">
            <!-- Loading Overlay -->
            <div id="loading-overlay" class="loading-overlay hidden">
                <div class="spinner"></div>
                <p>Fetching weather data...</p>
            </div>

            <!-- Header Section -->
            <header class="dashboard-header">
                <div>
                    <h1 class="greeting">Today's Overview</h1>
                    <p class="date" id="current-date">-- -- ----</p>
                </div>
            </header>

            <!-- Dashboard Grid -->
            <div class="dashboard-grid fade-in hidden" id="weather-content">

                <!-- Current Weather Highlight -->
                <section class="current-weather glass-panel">
                    <div class="weather-top">
                        <div class="location-info">
                            <h2 id="city-name">--</h2>
                            <p id="country-name">--</p>
                        </div>
                        <img id="current-icon" class="weather-icon-large" src="" alt="Weather Icon">
                    </div>

                    <div class="weather-main">
                        <h1 id="current-temp" class="temperature">--°</h1>
                        <p id="weather-desc" class="condition">--</p>
                    </div>

                    <div class="weather-details">
                        <div class="detail-card">
                            <i class="fa-solid fa-temperature-half"></i>
                            <div>
                                <span class="label">Feels Like</span>
                                <span id="feels-like" class="value">--°</span>
                            </div>
                        </div>
                        <div class="detail-card">
                            <i class="fa-solid fa-droplet"></i>
                            <div>
                                <span class="label">Humidity</span>
                                <span id="humidity" class="value">--%</span>
                            </div>
                        </div>
                        <div class="detail-card">
                            <i class="fa-solid fa-wind"></i>
                            <div>
                                <span class="label">Wind</span>
                                <span id="wind-speed" class="value">-- km/h</span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Hourly Forecast Graph (Today's Overview) -->
                <section class="hourly-forecast glass-panel hidden" id="hourly-section">
                    <div class="section-header flat">
                        <h3 id="hourly-title">Today's Overview</h3>
                    </div>

                    <div class="hourly-graph-wrapper">
                        <div class="chart-container">
                            <canvas id="hourly-chart"></canvas>
                        </div>
                        <div id="hourly-details" class="hourly-details-container">
                            <!-- Dynamic items generated via JS -->
                        </div>
                    </div>
                </section>

                <!-- Forecast Section -->
                <section class="forecast-section">
                    <div class="section-header glass-panel flat">
                        <h3>5-Day Forecast</h3>
                    </div>
                    <div class="forecast-grid" id="forecast-container">
                        <!-- Dynamic Forecast Cards -->
                    </div>
                </section>

            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="app.js?v=2"></script>
</body>

</html>
